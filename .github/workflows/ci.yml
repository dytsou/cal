name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          {
            [ -n "${{ secrets.WORKER_URL }}" ] && echo "WORKER_URL=${{ secrets.WORKER_URL }}" || echo "WORKER_URL="
          } > .env

      - name: Run build
        run: pnpm build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "Error: dist/index.html was not generated"
            exit 1
          fi
          if grep -q "calendarUrls:" dist/index.html; then
            echo "Error: calendarUrls should not be in HTML (managed via Worker secrets)"
            exit 1
          fi
          if grep -q "{{WORKER_URL}}" dist/index.html; then
            echo "Error: {{WORKER_URL}} placeholder was not replaced"
            exit 1
          fi
          if [ -n "${{ secrets.WORKER_URL }}" ]; then
            if ! grep -qF "${{ secrets.WORKER_URL }}/calendar.html" dist/index.html; then
              echo "Error: WORKER_URL secret is set but the built calendar iframe does not point to it."
              echo "       The build likely fell back to the open-web-calendar default, which bypasses"
              echo "       the proxy Worker and results in an empty calendar (no events)."
              exit 1
            fi
            echo "✓ Calendar iframe points to the configured Worker URL"
          fi
          echo "✓ Build verification passed"

      - name: Verify deploy contract
        run: |
          node --input-type=module -e "
            import { readFileSync, existsSync } from 'node:fs';
            const c = JSON.parse(readFileSync('deploy-contract.json', 'utf8'));
            if (c.ownerRepo !== 'dytsou/cal') throw new Error('ownerRepo');
            if (c.outputDir !== 'dist') throw new Error('outputDir');
            if (!existsSync('dist/index.html')) throw new Error('missing dist/index.html');
            console.log('verify-deploy-contract: ok');
          "

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist
          retention-days: 1
          if-no-files-found: error
